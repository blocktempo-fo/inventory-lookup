name: Sync Google Sheet CSV

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download CSV from Google Sheets
        run: |
          curl -L "https://docs.google.com/spreadsheets/d/1uQ2i6pbZY-aykeNduv7HtxS1-hl2zL-mKdEjB5gEq-s/export?format=csv&gid=722714951" -o data.csv

      - name: Check file
        run: |
          echo "Preview:"
          head -n 5 data.csv || true
          test -s data.csv

      - name: Commit updated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.csv
          git diff --cached --quiet || git commit -m "chore: sync sheet data"

      - name: Push changes
        run: |
          git push
